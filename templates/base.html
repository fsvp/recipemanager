<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Recipe Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#f4f7ff,#eef2ff);
    min-height:100vh;
    font-family: 'Segoe UI', sans-serif;
}

.navbar{
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.main-card{
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.page-title{
    color:#2c3e50;
    font-weight:700;
}

.table{
    border-radius:15px;
    overflow:hidden;
}

.btn-success{
    padding:12px 25px;
    border-radius:12px;
    font-weight:600;
}

.form-control,
.form-select{
    border-radius:10px;
}

.alert{
    border-radius:12px;
}

pre{
    white-space: pre-wrap;
    margin:0;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold" href="/recipe">
🍲 Recipe Manager
</a>

<div class="navbar-nav ms-auto">

<a class="nav-link" href="/recipe">
➕ Add Recipe
</a>

<a class="nav-link" href="/recipes">
📋 Recipe List
</a>

<a class="nav-link" href="/ingredients">
🥦 Ingredients
</a>

<a class="nav-link text-warning fw-bold" href="/logout">
🚪 Logout
</a>

</div>

</div>

</nav>

<div class="container mt-5">

<div class="main-card">

{% with messages = get_flashed_messages() %}
{% if messages %}
{% for message in messages %}

<div class="alert alert-info">
{{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

{% block content %}
{% endblock %}

</div>

</div>

</body>
</html>
